<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Home</title>

<style>
:root{
  --bg1:#0a0f24; --bg2:#001f3f;
  --card:rgba(255,255,255,0.08);
  --accent:#00ccff; --on:#00ff9f;
}
body{
  margin:0;font-family:sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:#fff;
}
.container{max-width:520px;margin:auto;padding:20px;}
.card{
  background:var(--card);padding:18px;border-radius:16px;
  margin-bottom:18px;box-shadow:0 8px 25px rgba(0,0,0,0.4);
}
.relay{
  display:flex;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.08);
}
.status-dot{
  width:10px;height:10px;border-radius:50%;
  background:#555;margin-left:8px;
}
.status-dot.on{background:var(--on);box-shadow:0 0 12px var(--on);}
.switch{position:relative;width:50px;height:26px;}
.switch input{display:none;}
.slider{
  position:absolute;background:#555;border-radius:30px;
  top:0;bottom:0;left:0;right:0;
}
.slider:before{
  content:'';position:absolute;width:20px;height:20px;
  left:3px;top:3px;background:#fff;border-radius:50%;
}
input:checked + .slider{background:var(--accent);}
input:checked + .slider:before{transform:translateX(24px);}
.btn{padding:10px;margin:5px;border:none;border-radius:10px;}
.on{background:#00cc66;} .off{background:#ff4d4d;color:#fff;}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>🏠 Smart Home</h2>
<p id="status">Loading...</p>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Devices</h3>

<div class="relay">
<div>💡 Device 1 <span id="dot1" class="status-dot"></span></div>
<label class="switch"><input id="r1" type="checkbox"><span class="slider"></span></label>
</div>

<div class="relay">
<div>💡 Device 2 <span id="dot2" class="status-dot"></span></div>
<label class="switch"><input id="r2" type="checkbox"><span class="slider"></span></label>
</div>

<div class="relay">
<div>💡 Device 3 <span id="dot3" class="status-dot"></span></div>
<label class="switch"><input id="r3" type="checkbox"><span class="slider"></span></label>
</div>

<div class="relay">
<div>💡 Device 4 <span id="dot4" class="status-dot"></span></div>
<label class="switch"><input id="r4" type="checkbox"><span class="slider"></span></label>
</div>

</div>

<div class="card">
<h3>Energy</h3>
<p id="power">Loading...</p>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDfMwGBFie7MmjrMsilmbpAEkwFoKmMBF4",
  authDomain:"esp32-4ae9b.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
let uid="";

firebase.auth().onAuthStateChanged(user=>{
  if(!user){window.location="login.html";}
  else{
    uid=user.uid;
    document.getElementById("status").innerText="Welcome "+user.email;
    loadData();
  }
});

function toggleRelay(id,state){
 fetch("https://esp32-4ae9b-default-rtdb.firebaseio.com"+uid+"/devices/relay"+id+".json",{
  method:"PUT",body:JSON.stringify(state?1:0)
 });
 document.getElementById("dot"+id).classList.toggle("on",state);
}

for(let i=1;i<=4;i++){
 document.getElementById("r"+i).addEventListener("change",function(){
   toggleRelay(i,this.checked);
 });
}

function loadData(){
 fetch("https://esp32-4ae9b-default-rtdb.firebaseio.com"+uid+"/devices.json")
 .then(r=>r.json())
 .then(d=>{
   for(let i=1;i<=4;i++){
     let state=d["relay"+i];
     document.getElementById("r"+i).checked=state;
     document.getElementById("dot"+i).classList.toggle("on",state);
   }
 });
}

setInterval(()=>{
 fetch("https://esp32-4ae9b-default-rtdb.firebaseio.com"+uid+"/power.json")
 .then(r=>r.json())
 .then(p=>{
   document.getElementById("power").innerText="Power: "+p+" mW";
 });
},2000);

function logout(){
 firebase.auth().signOut().then(()=>window.location="login.html");
}
</script>

</body>
</html>
