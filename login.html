<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
body{
  font-family:sans-serif;
  background:#0a0f24;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:12px;
  width:300px;
}
input,button{
  width:100%;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}
button{background:#00ccff;}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

<p id="msg"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDfMwGBFie7MmjrMsilmbpAEkwFoKmMBF4",
  authDomain: "esp32-4ae9b.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=> window.location.href="index.html")
  .catch(err=> document.getElementById("msg").innerText=err.message);
}

function signup(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then((userCredential)=>{
    let user = userCredential.user;

    fetch("https://esp32-4ae9b-default-rtdb.firebaseio.com"+user.uid+".json",{
      method:"PUT",
      body:JSON.stringify({
        name:"User",
        email:user.email,
        devices:{relay1:0,relay2:0,relay3:0,relay4:0},
        power:0
      })
    });

    document.getElementById("msg").innerText="Account Created!";
  })
  .catch(err=> document.getElementById("msg").innerText=err.message);
}
</script>

</body>
</html>
