<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0a0f24,#001f3f);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:16px;
  width:320px;
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

h2{text-align:center;margin-bottom:15px;}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00ccff;
  font-weight:bold;
  cursor:pointer;
}

.link{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
  color:#00ccff;
}

#msg{font-size:13px;color:#ff6b6b;}
</style>
</head>

<body>

<div class="card">
<h2>🔐 Smart Home</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Create Account</button>

<div class="link" onclick="resetPassword()">Forgot Password?</div>

<p id="msg"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDfMwGBFie7MmjrMsilmbpAEkwFoKmMBF4",
  authDomain:"esp32-4ae9b.firebaseapp.com"
};


firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* AUTO REDIRECT */
auth.onAuthStateChanged(user=>{
  if(user){
    window.location.replace("index.html");
  }
});

/* LOGIN */
function login(){
  let email = emailInput.value;
  let pass = password.value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=> window.location="index.html")
  .catch(err=> msg.innerText=err.message);
}

/* SIGNUP */
function signup(){
  let email = emailInput.value;
  let pass = password.value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(userCred=>{
    let uid = userCred.user.uid;

    fetch("https://esp32-4ae9b-default-rtdb.firebaseio.com/"+uid+"/profile.json",{
      method:"PUT",
      body:JSON.stringify({
        name:"New User",
        email:email,
        devices:{relay1:0,relay2:0,relay3:0,relay4:0},
        power:0
      })
    });

    msg.innerText="Account created!";
  })
  .catch(err=> msg.innerText=err.message);
}

/* RESET PASSWORD */
function resetPassword(){
  let email = emailInput.value;

  if(!email){
    msg.innerText="Enter email first";
    return;
  }

  auth.sendPasswordResetEmail(email)
  .then(()=> msg.innerText="Reset email sent!")
  .catch(err=> msg.innerText=err.message);
}
</script>

</body>
</html>
