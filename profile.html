<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0a0f24,#001f3f);
  color:#fff;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:16px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>👤 Profile</h2>

<p id="email"></p>

<input id="nameInput" placeholder="Your Name">
<button onclick="updateName()">Update Name</button>

<button onclick="goBack()">⬅ Back</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDfMwGBFie7MmjrMsilmbpAEkwFoKmMBF4",
  authDomain:"esp32-4ae9b.firebaseapp.com"
};


firebase.initializeApp(firebaseConfig);

let uid="";

firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    window.location="login.html";
  }else{
    uid=user.uid;
    document.getElementById("email").innerText=user.email;

    fetch("https://esp32-4ae9b-default-rtdb.firebaseio.com/"+uid+"/name.json")
    .then(r=>r.json())
    .then(d=>{
      nameInput.value=d.name;
    });
  }
});

function updateName(){
  fetch("https://esp32-4ae9b-default-rtdb.firebaseio.com/"+uid+"/name.json",{
    method:"PUT",
    body:JSON.stringify(nameInput.value)
  });
  alert("Updated!");
}

function goBack(){
  window.location="index.html";
}
</script>

</body>
</html>
